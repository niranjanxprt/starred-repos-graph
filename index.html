<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 GitHub Stars Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 25px;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: bold;
            color: #4ECDC4;
        }

        .controls-panel {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            z-index: 999;
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #E2E8F0;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.5);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .filter-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: capitalize;
            white-space: nowrap;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: linear-gradient(45deg, #4ECDC4, #44A08D);
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .legend-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            z-index: 999;
            max-width: 250px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .legend-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #E2E8F0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        #graph {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            font-size: 13px;
            max-width: 350px;
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .tooltip-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4ECDC4;
            word-break: break-word;
        }

        .tooltip-owner {
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        .tooltip-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tooltip-stat {
            font-size: 12px;
            color: #A0AEC0;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .tooltip-desc {
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 8px;
            color: #E2E8F0;
        }

        .tooltip-category {
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            color: #4ECDC4;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .tooltip-action {
            font-size: 11px;
            color: #4ECDC4;
            font-style: italic;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1002;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #4ECDC4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        .progress-text {
            margin-top: 10px;
            font-size: 14px;
            color: #A0AEC0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .node {
            cursor: pointer;
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .node:hover {
            stroke-width: 3px;
            filter: brightness(1.3) drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
        }

        .link {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1px;
        }

        .node-label {
            font-size: 10px;
            font-weight: 600;
            text-anchor: middle;
            pointer-events: none;
            fill: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* Mobile menu toggle buttons */
        .mobile-toggle {
            display: none;
            position: fixed;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .mobile-toggle:hover {
            background: rgba(0, 0, 0, 0.95);
            transform: scale(1.05);
        }

        .toggle-controls {
            bottom: 80px;
            left: 20px;
        }

        .toggle-legend {
            bottom: 20px;
            left: 20px;
        }

        .panel-close {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .panel-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Responsive adjustments - Enhanced Mobile UI (Bottom Sheet Panels) */

        /* Mobile devices (up to 767px) */
        @media (max-width: 767px) {
            .app-header {
                flex-direction: column;
                gap: 8px;
                padding: 10px 14px;
            }

            .title {
                font-size: 19px;
            }

            .stats {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
                width: 100%;
            }

            .stat-item {
                font-size: 11px;
            }

            .stat-number {
                font-size: 16px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .refresh-btn {
                font-size: 11px;
                padding: 6px 10px;
            }

            .mobile-toggle {
                display: flex;
                flex-direction: column;
                width: 56px;
                height: 56px;
                font-size: 20px;
                border-radius: 14px;
                gap: 2px;
            }

            .toggle-label {
                display: block;
            }

            .panel-close {
                display: flex;
            }

            /* Bottom sheet panels */
            .controls-panel,
            .legend-panel {
                position: fixed;
                left: 0;
                right: 0;
                bottom: -100%;
                top: auto;
                max-width: 100%;
                width: 100%;
                max-height: 80vh;
                border-radius: 20px 20px 0 0;
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-bottom: none;
                overflow-y: auto;
                transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
                padding: 0 20px 30px;
            }

            .controls-panel.mobile-open,
            .legend-panel.mobile-open {
                bottom: 0;
            }

            .panel-drag-handle {
                display: block;
            }

            .swipe-hint {
                display: block;
            }

            #graph {
                width: 100vw;
                height: 100vh;
                position: fixed;
            }

            .tooltip {
                max-width: 90vw;
                font-size: 12px;
            }

            .tooltip-title {
                font-size: 14px;
            }

            .control-label {
                font-size: 13px;
            }

            .search-input {
                font-size: 16px;
                padding: 11px 36px 11px 12px;
            }

            .filter-btn {
                font-size: 10px;
                padding: 7px 10px;
            }

            .legend-item {
                font-size: 11px;
                padding: 6px 8px;
            }
        }

        /* Medium devices (tablets, 768px to 1023px) */
        @media (min-width: 768px) and (max-width: 1023px) {
            .app-header {
                padding: 15px 20px;
            }

            .title {
                font-size: 22px;
            }

            .stats {
                gap: 20px;
            }

            .controls-panel {
                max-width: 280px;
                top: 70px;
            }

            .legend-panel {
                max-width: 220px;
                top: 70px;
            }

            .tooltip {
                max-width: 300px;
            }
        }

        /* Large devices (desktops, 1024px and up) */
        @media (min-width: 1024px) {
            .controls-panel {
                max-width: 320px;
            }

            .legend-panel {
                max-width: 250px;
            }
        }

        /* Landscape orientation optimizations for mobile */
        @media (max-width: 767px) and (orientation: landscape) {
            .app-header {
                flex-direction: row;
                padding: 8px 15px;
                gap: 10px;
            }

            .title {
                font-size: 16px;
            }

            .stats {
                gap: 8px;
                font-size: 11px;
                flex-wrap: nowrap;
            }

            .stat-number {
                font-size: 14px;
            }

            .stat-item div:not(.stat-number) {
                font-size: 10px;
            }

            .header-actions {
                width: auto;
            }

            .mobile-toggle {
                width: 44px;
                height: 44px;
                font-size: 18px;
                border-radius: 12px;
            }

            .toggle-label {
                font-size: 9px;
            }

            .toggle-controls {
                bottom: 60px;
                left: 15px;
            }

            .toggle-legend {
                bottom: 10px;
                left: 15px;
            }

            /* Side panel in landscape for more space */
            .controls-panel,
            .legend-panel {
                bottom: auto;
                top: 0;
                left: -60%;
                right: auto;
                width: 55%;
                max-width: 55%;
                max-height: 100vh;
                border-radius: 0 16px 16px 0;
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-left: none;
                padding: 50px 20px 20px;
                transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .controls-panel.mobile-open,
            .legend-panel.mobile-open {
                left: 0;
                bottom: auto;
            }

            .panel-drag-handle {
                display: none;
            }

            .swipe-hint {
                display: none;
            }
        }

        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            .filter-btn,
            .legend-item,
            .refresh-btn,
            .mobile-toggle {
                min-height: 44px;
                min-width: 44px;
            }

            .node {
                stroke-width: 3px;
            }

            .search-input {
                font-size: 16px;
            }
        }

        /* Prevent zoom on double tap for better UX */
        button,
        input {
            touch-action: manipulation;
        }

        .error-message {
            background: #ef4444;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }

        .success-message {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        /* Header actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .refresh-btn {
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.12);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-1px);
        }

        /* small note text under stats */
        .stat-note {
            font-size: 11px;
            color: #A0AEC0;
            margin-top: 2px;
            font-style: italic;
        }

        /* ===== Enhanced Mobile UI Additions ===== */

        /* Panel backdrop overlay */
        .panel-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 997;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }
        .panel-backdrop.visible {
            display: block;
            opacity: 1;
        }

        /* Bottom sheet drag handle */
        .panel-drag-handle {
            display: none;
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            margin: 12px auto 10px;
            flex-shrink: 0;
            cursor: grab;
        }

        /* Swipe hint text */
        .swipe-hint {
            display: none;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 10px;
            font-style: italic;
        }

        /* Search wrapper for clear button */
        .search-wrapper {
            position: relative;
        }

        /* Search clear button */
        .search-clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            font-size: 15px;
            padding: 4px 6px;
            display: none;
            line-height: 1;
            transition: color 0.2s;
            touch-action: manipulation;
            border-radius: 50%;
        }
        .search-clear-btn.visible {
            display: block;
        }
        .search-clear-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Mobile toggle label */
        .toggle-label {
            display: none;
            font-size: 10px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.02em;
        }

        /* Active toggle state */
        .mobile-toggle.active-toggle {
            background: rgba(78, 205, 196, 0.25);
            border-color: rgba(78, 205, 196, 0.6);
            color: #4ECDC4;
        }

        /* Ripple effect on buttons */
        .filter-btn,
        .refresh-btn,
        .mobile-toggle,
        .legend-item {
            position: relative;
            overflow: hidden;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.28);
            transform: scale(0);
            animation: ripple-anim 0.5s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        /* Animated stat counter pop */
        @keyframes statPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); color: #7EDDD7; }
            100% { transform: scale(1); }
        }
        .stat-number.pop {
            animation: statPop 0.35s ease;
        }

        /* Touch tap tooltip (mobile) - shows a "tap again to open" hint */
        .tooltip-tap-hint {
            font-size: 11px;
            color: #4ECDC4;
            font-style: italic;
            margin-top: 4px;
        }

        /* Smooth panel appearance on mobile */
        @media (max-width: 767px) {
            .controls-panel,
            .legend-panel {
                will-change: bottom;
            }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1 class="title">🌟 GitHub Stars Graph</h1>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="total-repos">0</div>
                <div>Total Repos</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="visible-repos">0</div>
                <div>Visible</div>
            </div>
            <div class="stat-item">
                <div style="font-size: 12px;" id="last-updated">Loading...</div>
                <div>Updated</div>
                <div class="stat-note" id="data-source-note">...</div>
            </div>
        </div>
        <div class="header-actions">
            <button id="refresh-now" class="refresh-btn" title="Opens GitHub Actions → Update Stars and Deploy to Pages → Run workflow. This fetches latest stars and redeploys Pages automatically.">🔄 Refresh Data</button>
        </div>
    </div>

    <div class="panel-backdrop" id="panel-backdrop"></div>

    <div class="controls-panel" id="controls-panel">
        <div class="panel-drag-handle" id="controls-drag-handle"></div>
        <div class="swipe-hint">Swipe down to close</div>
        <button class="panel-close" id="close-controls">✕</button>
        <div class="control-section">
            <label class="control-label">🔍 Search Repositories</label>
            <div class="search-wrapper">
                <input type="text" id="search" class="search-input" placeholder="Search name, topics, language…">
                <button class="search-clear-btn" id="search-clear" title="Clear search">✕</button>
            </div>
        </div>
        
        <div class="control-section">
            <label class="control-label">📁 Filter by Category</label>
            <div class="filter-grid" id="category-filters"></div>
        </div>

        <div class="control-section">
            <label class="control-label">💻 Filter by Language</label>
            <div class="filter-grid" id="language-filters"></div>
        </div>

        <div class="control-section">
            <label class="control-label">⭐ Filter by Stars</label>
            <div class="filter-grid" id="stars-filters">
                <button class="filter-btn active" data-stars="all">All</button>
                <button class="filter-btn" data-stars="1000">1K+</button>
                <button class="filter-btn" data-stars="5000">5K+</button>
                <button class="filter-btn" data-stars="10000">10K+</button>
                <button class="filter-btn" data-stars="50000">50K+</button>
            </div>
        </div>
    </div>

    <div class="legend-panel" id="legend-panel">
        <div class="panel-drag-handle" id="legend-drag-handle"></div>
        <div class="swipe-hint">Swipe down to close</div>
        <button class="panel-close" id="close-legend">✕</button>
        <div class="legend-title">🎨 Repository Categories</div>
        <div id="legend-items"></div>
    </div>

    <!-- Mobile toggle buttons -->
    <button class="mobile-toggle toggle-controls" id="toggle-controls" title="Open Filters">
        <span class="toggle-icon">⚙️</span>
        <span class="toggle-label">Filters</span>
    </button>
    <button class="mobile-toggle toggle-legend" id="toggle-legend" title="Open Legend">
        <span class="toggle-icon">🎨</span>
        <span class="toggle-label">Legend</span>
    </button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading your GitHub starred repositories...</p>
        <div class="progress-text" id="progress-text">Initializing...</div>
    </div>

    <svg id="graph"></svg>
    <div class="tooltip" id="tooltip"></div>

    <script>
        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new GitHubStarsGraph();
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
